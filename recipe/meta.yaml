{% set name = "qpax" %}
{% set version = "0.0.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/kevin-tracy/qpax/archive/v{{ version }}.tar.gz
  sha256: 69e21c1f877927368645a9eb12128aa4277a407a20ccd14f8609b80811085d72

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - jax >=0.4.0
    - jaxlib >=0.4.0

test:
  imports:
    - qpax
  commands:
    - pip check
    - pytest
  requires:
    - pip
    - pytest
    - python {{ python_min }}
  source_files:
    - test/*

about:
  home: https://github.com/kevin-tracy/qpax
  summary: Differentiable QP solver in JAX.
  dev_url: https://github.com/kevin-tracy/qpax
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - flferretti
